<!DOCTYPE html>
<html>

	<head>
		<meta charset="UTF-8">
		<title></title>
		<style>
			@import "http://fonts.useso.com/css?family=Rubik+Mono+One";
			html,
			body {
				height: 100%;
				width: 100%;
				margin: 0;
				display: flex;
				justify-content: center;
				align-items: center;
				flex-direction: column;
				background: #99E1D9;
				overflow: hidden;
				font-family: 'Rubik Mono One', sans-serif;
			}
			
			.words {
				color: #99E1E0;
				font-size: 0;
				line-height: 1;
			}
			
			.words span {
				font-size: 120px;
				display: inline-block;
				animation: move 2s ease-in-out infinite;
			}
			
			.words span:nth-child(2) {
				animation-delay: 0.4s;
			}
			
			.words span:nth-child(3) {
				animation-delay: 0.8s;
			}
			
			.words span:nth-child(4) {
				animation-delay: 1.3s;
			}
			
			@keyframes move {
				0% {
					transform: translate(-25%, 0);
				}
				50% {
					text-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
				}
				100% {
					transform: translate(33%, 0);
				}
			}
		</style>
	</head>

	<body>
		<div class="words words-1">
			<span>生</span>
			<span>日</span>
			<span>快</span>
			<span>乐</span>
		</div>
		<div class="words words-1">
			<span>H</span>
			<span>A</span>
			<span>P</span>
			<span>P</span>
			<span>Y</span>
		</div>
		<div class="words words-1">
			<span>B</span>
			<span>I</span>
			<span>R</span>
			<span>T</span>
			<span>H</span>
			<span>D</span>
			<span>A</span>
			<span>Y</span>
		</div>
	</body>

</html>
